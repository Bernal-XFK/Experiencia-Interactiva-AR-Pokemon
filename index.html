<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Pokémon AR Experience</title>

  <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pokemon-gold: #FFD700;
      --pokemon-red:  #CC2200;
      --pokemon-dark: #0a0820;
      --pokemon-glow: rgba(255,215,0,0.6);
      --font-main: 'Arial Black', 'Arial Bold', Arial, sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--pokemon-dark);
      font-family: var(--font-main);
    }

    /* DESKTOP */
    #desktop-view {
      display: flex; align-items: center; justify-content: center;
      width: 100vw; height: 100vh;
      background: radial-gradient(ellipse at 50% 40%, #1e0a4a 0%, #0d0630 50%, #050215 100%);
      position: relative; overflow: hidden;
    }
    #desktop-view::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,215,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,215,0,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: grid-drift 20s linear infinite;
    }
    @keyframes grid-drift {
      from { transform: translate(0,0); } to { transform: translate(50px,50px); }
    }
    .desktop-wrapper {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 28px;
    }
    .poster-frame {
      padding: 6px;
      background: linear-gradient(135deg, var(--pokemon-gold), #b8860b, var(--pokemon-gold));
      border-radius: 16px;
      animation: poster-breathe 4s ease-in-out infinite;
    }
    @keyframes poster-breathe {
      0%,100% { box-shadow: 0 0 30px var(--pokemon-glow), 0 0 80px rgba(255,215,0,0.2), 0 20px 60px rgba(0,0,0,0.8); }
      50%     { box-shadow: 0 0 50px var(--pokemon-glow), 0 0 120px rgba(255,215,0,0.4), 0 20px 60px rgba(0,0,0,0.8); }
    }
    #marker-img { display: block; height: 65vh; width: auto; max-width: 38vw; border-radius: 12px; }
    .desktop-info { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .scan-badge {
      display: flex; align-items: center; gap: 14px;
      background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3);
      border-radius: 40px; padding: 12px 24px; backdrop-filter: blur(8px);
    }
    .scan-icon { font-size: 2rem; animation: phone-swing 2s ease-in-out infinite; }
    @keyframes phone-swing {
      0%,100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); }
    }
    .scan-title { color: var(--pokemon-gold); font-size: 0.95rem; font-weight: 900; letter-spacing: 3px; }
    .scan-sub   { color: rgba(255,255,255,0.7); font-size: 0.78rem; letter-spacing: 1px; margin-top: 2px; }
    .desktop-hint {
      color: rgba(255,215,0,0.5); font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase;
      animation: fade-pulse 3s ease-in-out infinite;
    }
    @keyframes fade-pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.9; } }

    /* MOBILE */
    #mobile-view { display: none; position: fixed; inset: 0; width: 100vw; height: 100vh; }
    #ar-container { position: absolute; inset: 0; width: 100%; height: 100%; }

    /* Start Overlay */
    #start-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #1e0a4a 0%, #0a0820 70%, #000008 100%);
    }
    .start-card {
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; padding: 40px 32px; max-width: 340px; width: 90%; text-align: center;
    }
    .pokeball-icon {
      width: 80px; height: 80px;
      background: conic-gradient(var(--pokemon-red) 180deg, white 180deg);
      border-radius: 50%; border: 6px solid #111; position: relative;
      animation: pokeball-spin 3s linear infinite;
      box-shadow: 0 0 30px rgba(204,34,0,0.5);
    }
    .pokeball-icon::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 22px; height: 22px; background: #888; border-radius: 50%; border: 5px solid #111;
    }
    @keyframes pokeball-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .start-title {
      color: var(--pokemon-gold); font-size: 2rem; font-weight: 900;
      letter-spacing: 4px; text-shadow: 0 0 20px rgba(255,215,0,0.7);
    }
    .start-sub { color: rgba(200,180,255,0.9); font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; }
    .start-instructions { color: rgba(255,255,255,0.6); font-size: 0.82rem; line-height: 1.6; font-family: Arial,sans-serif; font-weight: normal; }
    #start-btn {
      margin-top: 8px; padding: 16px 48px;
      background: linear-gradient(135deg, var(--pokemon-red), #991a00);
      color: white; border: 2px solid rgba(255,100,100,0.4); border-radius: 40px;
      font-family: var(--font-main); font-size: 1rem; font-weight: 900;
      letter-spacing: 2px; cursor: pointer;
      box-shadow: 0 0 20px rgba(204,34,0,0.6), 0 4px 15px rgba(0,0,0,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #start-btn:active { transform: scale(0.96); box-shadow: 0 0 10px rgba(204,34,0,0.4); }
    .start-legal { color: rgba(255,255,255,0.3); font-size: 0.65rem; font-family: Arial,sans-serif; font-weight: normal; }

    /* HUD */
    #ar-hud { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
    .hud-top { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); }
    .hud-badge {
      background: rgba(0,0,0,0.5); color: #ff4444;
      border: 1px solid rgba(255,68,68,0.5); border-radius: 20px;
      padding: 6px 16px; font-size: 0.75rem; letter-spacing: 2px;
      backdrop-filter: blur(8px); animation: hud-blink 2s ease-in-out infinite;
    }
    @keyframes hud-blink { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .hud-bottom { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); white-space: nowrap; }
    .hud-hint {
      background: rgba(0,0,0,0.4); color: rgba(255,255,255,0.7);
      border-radius: 20px; padding: 8px 20px; font-size: 0.75rem;
      font-family: Arial,sans-serif; letter-spacing: 1px; backdrop-filter: blur(8px);
    }

    /* MindAR overrides */
    .mindar-ui-overlay { background: rgba(10,8,32,0.85) !important; }
    .mindar-ui-scanning .scanline { background: var(--pokemon-gold) !important; }
  </style>
</head>

<body>

  <!-- DESKTOP: muestra el marcador como póster -->
  <div id="desktop-view">
    <div class="desktop-wrapper">
      <div class="poster-frame">
        <img src="assets/marker.png" alt="Pokémon AR Marker" id="marker-img" />
      </div>
      <div class="desktop-info">
        <div class="scan-badge">
          <span class="scan-icon">📱</span>
          <div>
            <p class="scan-title">EXPERIENCIA AR</p>
            <p class="scan-sub">Apunta tu celular a esta imagen</p>
          </div>
        </div>
        <p class="desktop-hint">⬡ Pokémon Legendary AR Edition ⬡</p>
      </div>
    </div>
  </div>

  <!-- MOBILE: experiencia AR con cámara -->
  <div id="mobile-view">
    <div id="ar-container"></div>

    <div id="start-overlay">
      <div class="start-card">
        <div class="pokeball-icon"></div>
        <h1 class="start-title">POKÉMON AR</h1>
        <p class="start-sub">Experiencia de Realidad Aumentada</p>
        <p class="start-instructions">
          Apunta la cámara a la imagen marcador<br/>para activar la experiencia
        </p>
        <button id="start-btn">ACTIVAR CÁMARA</button>
        <p class="start-legal">Requiere acceso a cámara</p>
      </div>
    </div>

    <div id="ar-hud" style="display:none">
      <div class="hud-top"><span class="hud-badge">🔴 AR LIVE</span></div>
      <div class="hud-bottom"><span class="hud-hint">Apunta al marcador Pokémon</span></div>
    </div>
  </div>

  <script>
    'use strict';

    function isMobileDevice() {
      const mobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      const touchAndNarrow = ('ontouchstart' in window) && window.innerWidth < 900;
      return mobileUA || touchAndNarrow;
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (isMobileDevice()) {
        document.getElementById('desktop-view').style.display = 'none';
        document.getElementById('mobile-view').style.display = 'block';
        document.getElementById('start-btn').addEventListener('click', onStartClick);
      } else {
        document.getElementById('desktop-view').style.display = 'flex';
        document.getElementById('mobile-view').style.display = 'none';
      }
    });

    async function onStartClick() {
      const overlay = document.getElementById('start-overlay');
      overlay.style.transition = 'opacity 0.4s';
      overlay.style.opacity = '0';
      setTimeout(() => overlay.style.display = 'none', 400);
      document.getElementById('ar-hud').style.display = 'block';

      if (
        typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function'
      ) {
        try { await DeviceOrientationEvent.requestPermission(); }
        catch (err) { console.warn('Permiso giroscopio denegado:', err); }
      }

      await initAR();
    }

    async function initAR() {
      const { MindARThree } = window.MINDAR.IMAGE;
      const THREE = window.THREE;

      const mindarThree = new MindARThree({
        container: document.querySelector('#ar-container'),
        imageTargetSrc: './assets/targets.mind',
        uiLoading: 'yes',
        uiScanning: 'yes',
        uiError: 'yes',
      });

      const { renderer, scene, camera } = mindarThree;

      scene.add(new THREE.AmbientLight(0xffffff, 1.8));
      const dirLight = new THREE.DirectionalLight(0xffd7aa, 0.8);
      dirLight.position.set(0, 1, 2);
      scene.add(dirLight);

      const W = 0.75;
      const H = W * (16 / 9);

      const loader = new THREE.TextureLoader();
      const loadTex = (src) => {
        const tex = loader.load(src);
        tex.colorSpace = THREE.SRGBColorSpace;
        return tex;
      };

      // CAPA 0 — Background (más lejana)
      const bgMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(W * 1.25, H * 1.25),
        new THREE.MeshBasicMaterial({ map: loadTex('./assets/background.png'), transparent: true })
      );
      bgMesh.position.set(0, 0, -0.08);

      // CAPA 1 — Video
      const video = document.createElement('video');
      video.src = './assets/video.mp4';
      video.loop = true;
      video.muted = true;
      video.playsInline = true;
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');
      video.crossOrigin = 'anonymous';

      const videoTexture = new THREE.VideoTexture(video);
      videoTexture.colorSpace = THREE.SRGBColorSpace;

      const videoMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(W, H),
        new THREE.MeshBasicMaterial({ map: videoTexture, transparent: false })
      );
      videoMesh.position.set(0, 0, -0.02);

      // CAPA 2 — Middle PNG
      const midMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(W * 1.05, H * 1.05),
        new THREE.MeshBasicMaterial({ map: loadTex('./assets/middle.png'), transparent: true, alphaTest: 0.05, depthWrite: false })
      );
      midMesh.position.set(0, 0, 0.02);

      // CAPA 3 — Foreground (más cercana)
      const fgMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(W * 1.35, H * 1.35),
        new THREE.MeshBasicMaterial({ map: loadTex('./assets/foreground.png'), transparent: true, alphaTest: 0.05, depthWrite: false })
      );
      fgMesh.position.set(0, 0, 0.10);

      const anchor = mindarThree.addAnchor(0);
      anchor.group.add(bgMesh, videoMesh, midMesh, fgMesh);

      anchor.onTargetFound = () => video.play().catch(() => {});
      anchor.onTargetLost  = () => video.pause();

      // PARALLAX con giroscopio
      let rawTiltX = 0, rawTiltY = 0;
      let smoothTiltX = 0, smoothTiltY = 0;
      const SMOOTH = 0.06;
      const P = { bg: 0.025, vid: 0.008, mid: 0.015, fg: 0.045 };

      window.addEventListener('deviceorientation', (e) => {
        rawTiltX = Math.max(-1, Math.min(1, (e.gamma || 0) / 50));
        rawTiltY = Math.max(-1, Math.min(1, ((e.beta || 45) - 45) / 50));
      }, { passive: true });

      await mindarThree.start();

      renderer.setAnimationLoop(() => {
        smoothTiltX += (rawTiltX - smoothTiltX) * SMOOTH;
        smoothTiltY += (rawTiltY - smoothTiltY) * SMOOTH;
        const tx = smoothTiltX, ty = smoothTiltY;

        bgMesh.position.x    = -tx * P.bg;   bgMesh.position.y    =  ty * P.bg;
        videoMesh.position.x = -tx * P.vid;  videoMesh.position.y =  ty * P.vid;
        midMesh.position.x   =  tx * P.mid;  midMesh.position.y   = -ty * P.mid;
        fgMesh.position.x    =  tx * P.fg;   fgMesh.position.y    = -ty * P.fg;

        renderer.render(scene, camera);
      });
    }
  </script>

</body>
</html>
