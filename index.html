<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  />

  <title>Pokemon AR Experience</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      font-family:Arial, Helvetica, sans-serif;
    }

    /* DESKTOP */

    #desktop-view{
      width:100vw;
      height:100vh;

      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;

      gap:20px;

      background:#0b1020;

      padding:20px;
    }

    #desktop-view h1{
      color:white;
      font-size:2rem;
      text-align:center;
    }

    #marker-img{
      width:320px;
      max-width:80vw;

      border-radius:16px;

      box-shadow:0 0 40px rgba(255,255,255,0.2);
    }

    .desktop-text{
      color:#cccccc;
      text-align:center;
      max-width:500px;
      line-height:1.5;
    }

    /* MOBILE */

    #mobile-view{
      display:none;

      position:fixed;
      inset:0;

      width:100vw;
      height:100vh;

      overflow:hidden;

      background:black;
    }

    #ar-container{
      position:absolute;
      inset:0;

      width:100%;
      height:100%;
    }

    #overlay{
      position:fixed;
      inset:0;

      z-index:100;

      background:rgba(0,0,0,0.95);

      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;

      gap:20px;

      padding:30px;

      text-align:center;
    }

    #overlay h2{
      color:white;
      font-size:2rem;
    }

    #overlay p{
      color:#bbbbbb;
      line-height:1.6;
    }

    #start-btn{
      border:none;

      padding:16px 34px;

      border-radius:999px;

      background:#ff3333;

      color:white;

      font-size:1rem;
      font-weight:bold;

      cursor:pointer;
    }

    #debug{
      position:fixed;

      bottom:15px;
      left:15px;

      z-index:99999;

      background:rgba(0,0,0,0.8);

      color:#00ff88;

      font-size:12px;

      padding:10px;

      border-radius:10px;

      max-width:85vw;

      line-height:1.5;
    }
  </style>
</head>

<body>

  <!-- DESKTOP -->

  <div id="desktop-view">

    <h1>POKEMON AR EXPERIENCE</h1>

    <img
      id="marker-img"
      src="./assets/marker.png"
      alt="marker"
    />

    <p class="desktop-text">
      Abre esta misma página desde tu celular y apunta la cámara
      hacia esta imagen para activar la experiencia AR.
    </p>

  </div>

  <!-- MOBILE -->

  <div id="mobile-view">

    <div id="ar-container"></div>

    <div id="overlay">

      <h2>Pokemon AR</h2>

      <p>
        Presiona el botón y apunta la cámara
        al póster Pokémon
      </p>

      <button id="start-btn">
        ACTIVAR CÁMARA
      </button>

    </div>

  </div>

  <!-- DEBUG -->

  <div id="debug">
    DEBUG...
  </div>

  <script type="module">

    import * as THREE from 'https://unpkg.com/three@0.150.0/build/three.module.js';

    import { MindARThree } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js';

    const debug = document.getElementById("debug");

    function log(msg){

      console.log(msg);

      debug.innerHTML += "<br>" + msg;
    }

    function isMobileDevice(){

      return /Android|iPhone|iPad|iPod/i.test(
        navigator.userAgent
      );
    }

    document.addEventListener("DOMContentLoaded", ()=>{

      log("DOM READY");

      if(isMobileDevice()){

        log("MOBILE DETECTED");

        document.getElementById("desktop-view").style.display = "none";

        document.getElementById("mobile-view").style.display = "block";

        document
          .getElementById("start-btn")
          .addEventListener("click", startAR);

      }else{

        log("DESKTOP DETECTED");

        document.getElementById("desktop-view").style.display = "flex";

        document.getElementById("mobile-view").style.display = "none";
      }
    });

    async function startAR(){

      log("BUTTON CLICK");

      try{

        document.getElementById("overlay").style.display = "none";

        await initAR();

      }catch(err){

        console.error(err);

        log("ERROR: " + err.message);

        alert("ERROR: " + err.message);
      }
    }

    async function initAR(){

      log("INIT AR");

      if(!MindARThree){

        throw new Error("MindARThree no cargó");
      }

      log("MINDAR OK");

      const mindarThree = new MindARThree({

        container: document.querySelector("#ar-container"),

        imageTargetSrc: "./assets/targets.mind",

        uiLoading: true,

        uiScanning: true,

        uiError: true,
      });

      const { renderer, scene, camera } = mindarThree;

      log("SCENE CREATED");

      const light = new THREE.HemisphereLight(
        0xffffff,
        0xbbbbff,
        1
      );

      scene.add(light);

      const anchor = mindarThree.addAnchor(0);

      /* VIDEO */

      const video = document.createElement("video");

      video.src = "./assets/video.mp4";

      video.crossOrigin = "anonymous";

      video.loop = true;

      video.muted = true;

      video.autoplay = true;

      video.playsInline = true;

      video.setAttribute("playsinline","");

      video.setAttribute("webkit-playsinline","");

      await video.play().catch(()=>{});

      log("VIDEO READY");

      const videoTexture = new THREE.VideoTexture(video);

      const geometry = new THREE.PlaneGeometry(
        1,
        1.77
      );

      const material = new THREE.MeshBasicMaterial({

        map: videoTexture,

        transparent:true,
      });

      const plane = new THREE.Mesh(
        geometry,
        material
      );

      anchor.group.add(plane);

      anchor.onTargetFound = ()=>{

        log("TARGET FOUND");

        video.play().catch(()=>{});
      };

      anchor.onTargetLost = ()=>{

        log("TARGET LOST");

        video.pause();
      };

      await mindarThree.start();

      log("MINDAR STARTED");

      renderer.setAnimationLoop(()=>{

        renderer.render(scene,camera);
      });
    }

  </script>

</body>
</html>
