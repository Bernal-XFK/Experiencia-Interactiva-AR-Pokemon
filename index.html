<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pokemon AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }

    #desktop {
      width: 100vw; height: 100vh; display: none;
      align-items: center; justify-content: center; flex-direction: column; gap: 20px;
      background: #0b1020; color: white; text-align: center;
    }
    #desktop img { width: 300px; border-radius: 15px; border: 2px solid #00ff88; }

    #mobile { display: none; width: 100vw; height: 100vh; }

    #mobile-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #0b1020; color: white;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    #mobile-overlay button {
      padding: 18px 45px; font-size: 1.3rem; background: #00ff88; color: #000;
      border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
    }

    #debug {
      position: fixed; bottom: 10px; left: 10px; z-index: 10000;
      background: rgba(0,0,0,0.8); color: #00ff88; padding: 10px; border-radius: 8px;
      font-size: 10px; max-width: 80%; pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="debug">Iniciando sistema...</div>

  <div id="desktop">
    <h1>POKEMON AR</h1>
    <img src="./assets/marker.png" alt="marker" />
    <p>Escanea con tu celular para vivir la experiencia.</p>
  </div>

  <div id="mobile">
    <div id="mobile-overlay">
      <button id="start-ar-btn">ACTIVAR CÁMARA</button>
    </div>

    <a-scene
      id="ar-scene"
      mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false; uiLoading: no; uiScanning: no;"
      embedded 
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: false"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="pokemon-video" src="./assets/video.mp4" preload="auto" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="my-target" mindar-image-target="targetIndex: 0">
        <a-video src="#pokemon-video" position="0 0 0" width="1" height="1.77"></a-video>
      </a-entity>
    </a-scene>
  </div>

  <script>
    const debug = document.getElementById("debug");
    const log = (msg) => { debug.innerHTML += "<br>> " + msg; };

    function isMobile() { return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent); }

    // Validación inicial de vista
    if (isMobile()) {
      document.getElementById("mobile").style.display = "block";
    } else {
      document.getElementById("desktop").style.display = "flex";
    }

    document.getElementById("start-ar-btn").addEventListener("click", async () => {
      const sceneEl = document.querySelector('a-scene');
      const video = document.getElementById('pokemon-video');
      
      log("Botón pulsado.");
      
      try {
        // 1. Desbloquear video
        video.play().then(() => video.pause()).catch(() => {});
        
        // 2. Ocultar botón
        document.getElementById("mobile-overlay").style.display = "none";

        // 3. Arrancar el motor buscando el componente directamente en la escena
        // Esta es la forma más segura si el system falla
        const startEngine = () => {
          // Intentamos obtener el sistema de ambas formas posibles
          const arSystem = sceneEl.systems["mindar-image-system"];
          
          if (arSystem && arSystem.start) {
            log("Motor detectado. Arrancando cámara...");
            arSystem.start(); 
          } else {
            log("Buscando motor...");
            setTimeout(startEngine, 200);
          }
        };

        startEngine();

      } catch (err) {
        log("Error: " + err.message);
      }
    });

    // Eventos de detección
    const sceneEl = document.querySelector('a-scene');
    sceneEl.addEventListener("arReady", () => log("¡Cámara lista!"));
    sceneEl.addEventListener("arError", () => log("Error al iniciar AR."));

    const target = document.getElementById('my-target');
    target.addEventListener("targetFound", () => {
      log("POKEMON DETECTADO");
      document.getElementById('pokemon-video').play();
    });
    target.addEventListener("targetLost", () => {
      document.getElementById('pokemon-video').pause();
    });
  </script>
</body>
</html>
