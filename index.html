<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pokemon AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: black; font-family: Arial, sans-serif;
    }

    /* VISTA ESCRITORIO */
    #desktop {
      width: 100vw; height: 100vh;
      display: none;
      align-items: center; justify-content: center; flex-direction: column; gap: 20px;
      background: #0b1020;
    }

    #desktop img { width: 320px; max-width: 80vw; border-radius: 20px; }
    #desktop h1 { color: white; }
    #desktop p { color: #cccccc; text-align: center; max-width: 500px; line-height: 1.5; }

    /* VISTA MÓVIL */
    #mobile {
      display: none; 
      width: 100vw; height: 100vh;
    }

    /* PANTALLA DE PERMISOS */
    #mobile-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #0b1020; color: white;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 20px;
    }

    #mobile-overlay button {
      padding: 15px 40px; font-size: 1.2rem; background: #00ff88; color: #000;
      border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px;
    }

    #debug {
      position: fixed; bottom: 10px; left: 10px; z-index: 99999;
      background: rgba(0,0,0,0.8); color: #00ff88; padding: 10px; border-radius: 10px; font-size: 11px;
      max-width: 90%; word-wrap: break-word; pointer-events: none;
    }
  </style>
</head>

<body>

  <div id="desktop">
    <h1>POKEMON AR EXPERIENCE</h1>
    <img src="./assets/marker.png" alt="marker" />
    <p>Abre esta misma página desde tu celular y apunta la cámara a esta imagen.</p>
  </div>

  <div id="mobile">
    <div id="mobile-overlay">
      <h2>Experiencia AR</h2>
      <p style="margin-top: 10px; color: #aaa; font-size: 0.9rem;">
        Se requiere acceso a la cámara trasera.
      </p>
      <button id="start-ar-btn">INICIAR CÁMARA</button>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded>

      <a-assets>
        <video id="pokemon-video" src="./assets/video.mp4" preload="auto" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#pokemon-video" position="0 0 0" width="1" height="1.77"></a-video>
      </a-entity>

    </a-scene>
  </div>

  <div id="debug">DOM Listo...</div>

  <script>
    const debug = document.getElementById("debug");

    function log(msg) {
      console.log(msg);
      debug.innerHTML += "<br>> " + msg;
    }

    function isMobile() {
      return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    window.addEventListener("DOMContentLoaded", () => {
      if (isMobile()) {
        log("Móvil: Mostrando overlay...");
        document.getElementById("desktop").style.display = "none";
        document.getElementById("mobile").style.display = "block";
      } else {
        log("PC: Mostrando instrucciones...");
        document.getElementById("desktop").style.display = "flex";
        document.getElementById("mobile").style.display = "none";
      }
    });

    document.getElementById("start-ar-btn").addEventListener("click", async () => {
      log("Iniciando petición de cámara nativa...");
      
      const overlay = document.getElementById("mobile-overlay");
      const sceneEl = document.querySelector('a-scene');
      const video = document.getElementById('pokemon-video');

      try {
        // 1. FORZAR AL NAVEGADOR A PEDIR PERMISO
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("Tu navegador no soporta AR o no es seguro (necesitas HTTPS).");
        }

        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "environment" } 
        });
        
        log("Permiso de cámara concedido.");
        
        // Detenemos este stream porque MindAR creará el suyo propio
        stream.getTracks().forEach(track => track.stop());

        // 2. Quitamos el overlay
        overlay.style.display = "none";

        // 3. Pre-cargamos el video del pokemon silenciosamente
        video.play().catch(e => log("Video en espera..."));
        video.pause();

        // 4. Arrancamos MindAR
        log("Arrancando motor AR...");
        const arSystem = sceneEl.systems["mindar-image-system"];
        arSystem.start();

      } catch (err) {
        // AQUÍ ES DONDE VEREMOS QUÉ ESTÁ FALLANDO REALMENTE
        log("ERROR CÁMARA: " + err.name);
        
        if (err.name === "NotAllowedError") {
          log("Rechazaste el permiso. Limpia las cookies del sitio e intenta de nuevo.");
        } else if (err.name === "NotFoundError") {
          log("No se detectó ninguna cámara en el dispositivo.");
        } else {
          log("Detalle: " + err.message);
        }
      }
    });

    // Eventos de A-Frame
    const sceneEl = document.querySelector('a-scene');
    sceneEl.addEventListener("arReady", () => log("Motor AR Listo y renderizando."));
    
    const target = document.querySelector('[mindar-image-target]');
    target.addEventListener("targetFound", () => {
      log("¡MARCADOR DETECTADO!");
      document.getElementById('pokemon-video').play();
    });
    target.addEventListener("targetLost", () => {
      log("Marcador perdido.");
      document.getElementById('pokemon-video').pause();
    });
  </script>
</body>
</html>
