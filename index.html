<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pokemon AR</title>

  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    
    /* Forzamos que el canvas de AR ocupe toda la pantalla */
    .mindar-ui-overlay { z-index: 100; }
    
    #start-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: radial-gradient(circle, #2a3a5a, #0b1020);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: white; font-family: sans-serif;
    }

    #start-button {
      padding: 15px 35px; font-size: 1.2rem; background: #ffcb05; color: #3b4cca;
      border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    #debug {
      position: fixed; bottom: 10px; left: 10px; z-index: 10000;
      color: #00ff88; font-size: 10px; background: rgba(0,0,0,0.5); padding: 5px;
      pointer-events: none; max-width: 90%;
    }
  </style>
</head>
<body>

  <div id="debug">Esperando inicio...</div>

  <div id="start-screen">
    <img src="./assets/marker.png" style="width:150px; margin-bottom:20px; border-radius:10px;">
    <button id="start-button">INICIAR EXPERIENCIA</button>
    <p style="font-size: 12px; margin-top: 15px; opacity: 0.7;">Permite el acceso a la cámara</p>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false; uiLoading: no; uiScanning: yes;" 
    embedded 
    color-space="sRGB" 
    renderer="colorManagement: true; physicallyCorrectLights: false" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <video 
        id="pokemon-video" 
        src="./assets/video.mp4" 
        preload="auto" 
        loop 
        playsinline 
        webkit-playsinline 
        muted
        crossorigin="anonymous">
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-video 
        src="#pokemon-video" 
        position="0 0 0" 
        width="1" 
        height="1.77">
      </a-video>
    </a-entity>
  </a-scene>

  <script>
    const log = (msg) => {
      document.getElementById("debug").innerHTML += "<br>> " + msg;
    };

    const startButton = document.getElementById('start-button');
    const startScreen = document.getElementById('start-screen');
    const sceneEl = document.querySelector('a-scene');
    const video = document.getElementById('pokemon-video');

    startButton.addEventListener('click', () => {
      log("Iniciando motor...");
      startScreen.style.display = "none";

      // 1. Iniciar AR
      const arSystem = sceneEl.systems["mindar-image-system"];
      arSystem.start(); 

      // 2. Intentar reproducir video (necesario en móviles)
      video.play().then(() => {
        log("Video en espera...");
      }).catch(e => log("Esperando target..."));
    });

    // Eventos de estado
    sceneEl.addEventListener("arReady", () => log("Cámara activa."));
    sceneEl.addEventListener("arError", (e) => log("Error: " + e.detail.error));
    
    const target = document.querySelector('[mindar-image-target]');
    target.addEventListener("targetFound", () => {
      log("¡Pokemon detectado!");
      video.muted = false; // Activar sonido al encontrarlo
      video.play();
    });

    target.addEventListener("targetLost", () => {
      log("Target perdido.");
      video.pause();
    });
  </script>
</body>
</html>
