<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pokemon AR Fixed</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body { 
      width: 100%; height: 100%; overflow: hidden; 
      background: transparent !important; 
    }

    /* ELIMINA EL RECUADRO BLANCO */
    .a-canvas { width: 100% !important; height: 100% !important; position: absolute; top:0; left:0; }
    .a-enter-vr, .a-enter-ar, .a-loader-title { display: none !important; }

    #desktop {
      position: fixed; inset: 0; z-index: 2000;
      display: none; align-items: center; justify-content: center; flex-direction: column;
      background: #0b1020; color: white;
    }

    #mobile-overlay {
      position: fixed; inset: 0; z-index: 3000;
      background: #0b1020; color: white;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    #start-ar-btn {
      padding: 18px 45px; font-size: 1.3rem; background: #ffcb05; color: #3b4cca;
      border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
    }

    /* Forzar video de cámara a fondo total */
    video:not(#pokemon-video) {
      object-fit: cover !important;
      width: 100vw !important;
      height: 100vh !important;
      position: fixed; top: 0; left: 0; z-index: -1;
    }

    #debug {
      position: fixed; top: 10px; left: 10px; z-index: 4000;
      background: rgba(0,0,0,0.5); color: #00ff88; padding: 5px; border-radius: 5px;
      font-size: 9px; pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="debug">Iniciando...</div>

  <div id="desktop">
    <h1>POKEMON AR</h1>
    <img src="./assets/marker.png" style="width:250px; margin:20px;">
    <p>Abre este link en tu celular.</p>
  </div>

  <div id="mobile-overlay">
    <button id="start-ar-btn">INICIAR CÁMARA</button>
  </div>

  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false; uiLoading: no; uiScanning: no;"
    embedded 
    color-space="sRGB"
    renderer="colorManagement: true; antialias: true; alpha: true; precision: high;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video id="pokemon-video" src="./assets/video.mp4" loop playsinline webkit-playsinline muted></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
      <a-video src="#pokemon-video" position="0 0 0" width="1" height="1.77"></a-video>
    </a-entity>
  </a-scene>

  <script>
    const log = (msg) => { document.getElementById("debug").innerHTML += "<br>> " + msg; };
    const isMobile = () => /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    const sceneEl = document.querySelector('a-scene');
    const pokemonVideo = document.getElementById('pokemon-video');

    if (isMobile()) {
      document.getElementById("mobile-overlay").style.display = "flex";
    } else {
      document.getElementById("desktop").style.display = "flex";
    }

    document.getElementById("start-ar-btn").addEventListener("click", () => {
      log("Botón pulsado. Preparando motor...");
      document.getElementById("mobile-overlay").style.display = "none";
      
      // Desbloqueo preventivo del video
      pokemonVideo.play().then(() => pokemonVideo.pause()).catch(() => {});

      // FUNCIÓN DE ARRANQUE SEGURO
      const startAR = () => {
        const arSystem = sceneEl.systems["mindar-image-system"];
        
        if (arSystem) {
          log("Motor encontrado. Iniciando...");
          arSystem.start();
          
          // Ajuste de pantalla para quitar el recuadro blanco
          setTimeout(() => {
            window.dispatchEvent(new Event('resize'));
            log("Pantalla ajustada.");
          }, 500);
          
        } else {
          log("Motor no listo, reintentando...");
          setTimeout(startAR, 300); // Reintenta cada 300ms hasta que exista
        }
      };

      startAR();
    });

    const target = document.getElementById('target-anchor');
    target.addEventListener("targetFound", () => {
      log("¡Detectado!");
      pokemonVideo.muted = false; 
      pokemonVideo.play();
    });

    target.addEventListener("targetLost", () => {
      pokemonVideo.pause();
    });

    // Forzar transparencia del canvas
    sceneEl.addEventListener('render-target-loaded', () => {
      sceneEl.renderer.setClearColor(0x000000, 0);
    });
  </script>
</body>
</html>
