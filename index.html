<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pokemon AR Fix</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* 1. IMPORTANTE: El body y html deben ser transparentes para ver la cámara inyectada */
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent !important; }

    #desktop {
      position: fixed; inset: 0; z-index: 2000;
      display: none; align-items: center; justify-content: center; flex-direction: column;
      background: #0b1020; color: white;
    }

    #mobile-overlay {
      position: fixed; inset: 0; z-index: 3000;
      background: #0b1020; color: white;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    #start-ar-btn {
      padding: 18px 45px; font-size: 1.3rem; background: #00ff88; color: #000;
      border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
    }

    /* Forzamos que el video que genera MindAR se vea siempre */
    video:not(#pokemon-video) {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: -1;
    }

    #debug {
      position: fixed; bottom: 10px; left: 10px; z-index: 4000;
      background: rgba(0,0,0,0.7); color: #00ff88; padding: 8px; border-radius: 5px;
      font-size: 10px; pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="debug">Cargando...</div>

  <div id="desktop">
    <h1>POKEMON AR</h1>
    <img src="./assets/marker.png" style="width:250px; margin:20px; border:2px solid #00ff88;">
    <p>Escanea con tu celular.</p>
  </div>

  <div id="mobile-overlay">
    <button id="start-ar-btn">INICIAR CÁMARA</button>
  </div>

  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false; uiLoading: no; uiScanning: no;"
    embedded 
    color-space="sRGB"
    renderer="colorManagement: true; antialias: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video id="pokemon-video" src="./assets/video.mp4" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
      <a-video src="#pokemon-video" position="0 0 0" width="1" height="1.77"></a-video>
    </a-entity>
  </a-scene>

  <script>
    const log = (msg) => { document.getElementById("debug").innerHTML += "<br>> " + msg; };
    const isMobile = () => /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    if (isMobile()) {
      document.getElementById("mobile-overlay").style.display = "flex";
    } else {
      document.getElementById("desktop").style.display = "flex";
      document.getElementById("mobile-overlay").style.display = "none";
    }

    document.getElementById("start-ar-btn").addEventListener("click", () => {
      const sceneEl = document.querySelector('a-scene');
      const video = document.getElementById('pokemon-video');
      
      document.getElementById("mobile-overlay").style.display = "none";
      log("Iniciando...");

      const arSystem = sceneEl.systems["mindar-image-system"];
      
      // Intentar desbloquear el video inmediatamente
      video.play().then(() => {
        video.pause();
        log("Video desbloqueado.");
      }).catch(() => log("Error desbloqueo video."));

      arSystem.start();
    });

    const sceneEl = document.querySelector('a-scene');
    const pokemonVideo = document.getElementById('pokemon-video');

    sceneEl.addEventListener("arReady", () => log("Cámara lista."));

    const target = document.getElementById('target-anchor');
    
    target.addEventListener("targetFound", () => {
      log("Pokemon encontrado!");
      // 3. Forzar reproducción al detectar
      pokemonVideo.play().catch(e => log("Error play: " + e));
    });

    target.addEventListener("targetLost", () => {
      log("Target perdido.");
      pokemonVideo.pause();
    });
  </script>
</body>
</html>
