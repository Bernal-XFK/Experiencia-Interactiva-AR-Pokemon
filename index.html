<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  />

  <title>Pokemon AR Experience</title>

  <!-- THREE -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>

  <!-- MINDAR -->
  <script src="https://unpkg.com/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      font-family:Arial, Helvetica, sans-serif;
    }

    /* DESKTOP */

    #desktop-view{
      width:100vw;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0b1020;
      flex-direction:column;
      gap:20px;
    }

    #desktop-view h1{
      color:white;
      font-size:2rem;
      text-align:center;
    }

    #marker-img{
      width:320px;
      max-width:80vw;
      border-radius:16px;
      box-shadow:0 0 40px rgba(255,255,255,0.2);
    }

    .desktop-text{
      color:#ccc;
      text-align:center;
      font-size:1rem;
    }

    /* MOBILE */

    #mobile-view{
      display:none;
      width:100vw;
      height:100vh;
      position:fixed;
      inset:0;
      overflow:hidden;
    }

    #ar-container{
      width:100%;
      height:100%;
      position:absolute;
      inset:0;
    }

    #overlay{
      position:fixed;
      inset:0;
      z-index:10;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,0.95);
      flex-direction:column;
      gap:20px;
      padding:20px;
      text-align:center;
    }

    #overlay h2{
      color:white;
      font-size:2rem;
    }

    #overlay p{
      color:#bbb;
      line-height:1.5;
    }

    #start-btn{
      padding:16px 32px;
      border:none;
      border-radius:999px;
      background:#ff2d2d;
      color:white;
      font-size:1rem;
      font-weight:bold;
      cursor:pointer;
    }

    #debug{
      position:fixed;
      bottom:20px;
      left:20px;
      z-index:9999;
      color:#00ff88;
      background:rgba(0,0,0,0.7);
      padding:10px;
      font-size:12px;
      border-radius:10px;
      max-width:80vw;
    }
  </style>
</head>

<body>

  <!-- DESKTOP -->

  <div id="desktop-view">
    <h1>POKEMON AR EXPERIENCE</h1>

    <img
      id="marker-img"
      src="./assets/marker.png"
      alt="marker"
    />

    <p class="desktop-text">
      Abre esta misma página desde tu celular y apunta la cámara aquí
    </p>
  </div>

  <!-- MOBILE -->

  <div id="mobile-view">

    <div id="ar-container"></div>

    <div id="overlay">
      <h2>Pokemon AR</h2>

      <p>
        Presiona el botón y apunta la cámara al póster Pokémon
      </p>

      <button id="start-btn">
        ACTIVAR CÁMARA
      </button>
    </div>

  </div>

  <div id="debug">
    Debug...
  </div>

  <script>

    const debug = document.getElementById("debug");

    function log(msg){
      console.log(msg);
      debug.innerHTML += "<br>" + msg;
    }

    function isMobileDevice(){
      return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    document.addEventListener("DOMContentLoaded", ()=>{

      log("DOM READY");

      if(isMobileDevice()){

        log("MOBILE DETECTED");

        document.getElementById("desktop-view").style.display = "none";
        document.getElementById("mobile-view").style.display = "block";

        document
          .getElementById("start-btn")
          .addEventListener("click", startAR);

      }else{

        log("DESKTOP DETECTED");

        document.getElementById("desktop-view").style.display = "flex";
        document.getElementById("mobile-view").style.display = "none";
      }
    });

    async function startAR(){

      log("START BUTTON");

      try{

        const overlay = document.getElementById("overlay");
        overlay.style.display = "none";

        await initAR();

      }catch(err){

        console.error(err);

        alert("ERROR: " + err.message);

        log(err.message);
      }
    }

    async function initAR(){

      log("INIT AR");

      if(!window.MINDAR){

        throw new Error("MindAR no cargó");
      }

      const THREE = window.THREE;
      const { MindARThree } = window.MINDAR.IMAGE;

      log("MindAR OK");

      const mindarThree = new MindARThree({

        container: document.querySelector("#ar-container"),

        imageTargetSrc: "./assets/targets.mind",

        uiLoading: true,
        uiScanning: true,
        uiError: true,
      });

      const { renderer, scene, camera } = mindarThree;

      log("SCENE CREATED");

      const light = new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
      scene.add(light);

      const anchor = mindarThree.addAnchor(0);

      /* VIDEO */

      const video = document.createElement("video");

      video.src = "./assets/video.mp4";

      video.crossOrigin = "anonymous";

      video.loop = true;

      video.muted = true;

      video.playsInline = true;

      video.setAttribute("playsinline","");

      video.setAttribute("webkit-playsinline","");

      await video.play().catch(()=>{});

      log("VIDEO READY");

      const videoTexture = new THREE.VideoTexture(video);

      const geometry = new THREE.PlaneGeometry(1,1.77);

      const material = new THREE.MeshBasicMaterial({

        map: videoTexture,

        transparent:true,
      });

      const plane = new THREE.Mesh(geometry,material);

      anchor.group.add(plane);

      anchor.onTargetFound = ()=>{

        log("TARGET FOUND");

        video.play().catch(()=>{});
      };

      anchor.onTargetLost = ()=>{

        log("TARGET LOST");

        video.pause();
      };

      await mindarThree.start();

      log("MINDAR STARTED");

      renderer.setAnimationLoop(()=>{

        renderer.render(scene,camera);
      });
    }

  </script>

</body>
</html>
