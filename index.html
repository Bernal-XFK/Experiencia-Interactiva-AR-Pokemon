<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  />

  <title>Pokemon AR</title>

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- MINDAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:black;
      font-family:Arial, sans-serif;
    }

    #desktop{
      width:100vw;
      height:100vh;

      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;

      gap:20px;

      background:#0b1020;
    }

    #desktop img{
      width:320px;
      max-width:80vw;

      border-radius:20px;
    }

    #desktop h1{
      color:white;
    }

    #desktop p{
      color:#cccccc;
      text-align:center;
      max-width:500px;
      line-height:1.5;
    }

    #mobile{
      display:none;
      width:100vw;
      height:100vh;
    }

    #debug{
      position:fixed;

      bottom:10px;
      left:10px;

      z-index:99999;

      background:rgba(0,0,0,0.8);

      color:#00ff88;

      padding:10px;

      border-radius:10px;

      font-size:12px;
    }

  </style>
</head>

<body>

  <!-- DESKTOP -->

  <div id="desktop">

    <h1>POKEMON AR EXPERIENCE</h1>

    <img
      src="./assets/marker.png"
      alt="marker"
    />

    <p>
      Abre esta misma página desde tu celular y apunta
      la cámara a esta imagen.
    </p>

  </div>

  <!-- MOBILE -->

  <div id="mobile">

    <a-scene

      mindar-image="
        imageTargetSrc: ./assets/targets.mind;
        autoStart: true;
        uiLoading: yes;
        uiScanning: yes;
        uiError: yes;
      "

      color-space="sRGB"

      renderer="colorManagement: true; physicallyCorrectLights"

      vr-mode-ui="enabled: false"

      device-orientation-permission-ui="enabled: false"

      embedded

    >

      <a-assets>

        <video
          id="pokemon-video"
          src="./assets/video.mp4"
          preload="auto"
          autoplay
          loop
          muted
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>

      </a-assets>

      <a-camera
        position="0 0 0"
        look-controls="enabled: false"
      ></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">

        <a-video
          src="#pokemon-video"
          position="0 0 0"
          width="1"
          height="1.77"
        ></a-video>

      </a-entity>

    </a-scene>

  </div>

  <div id="debug">
    DEBUG...
  </div>

  <script>

    const debug = document.getElementById("debug");

    function log(msg){

      console.log(msg);

      debug.innerHTML += "<br>" + msg;
    }

    function isMobile(){

      return /Android|iPhone|iPad|iPod/i.test(
        navigator.userAgent
      );
    }

    window.addEventListener("DOMContentLoaded", ()=>{

      log("DOM READY");

      if(isMobile()){

        log("MOBILE DETECTED");

        document.getElementById("desktop").style.display = "none";

        document.getElementById("mobile").style.display = "block";

      }else{

        log("DESKTOP DETECTED");

        document.getElementById("desktop").style.display = "flex";

        document.getElementById("mobile").style.display = "none";
      }
    });

  </script>

</body>
</html>
