<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pokemon AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: black; font-family: Arial, sans-serif; }

    #desktop {
      width: 100vw; height: 100vh; display: none;
      align-items: center; justify-content: center; flex-direction: column; gap: 20px;
      background: #0b1020; color: white;
    }
    #desktop img { width: 320px; max-width: 80vw; border-radius: 20px; }

    #mobile { display: none; width: 100vw; height: 100vh; }

    #mobile-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #0b1020; color: white;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 20px;
    }
    #mobile-overlay button {
      padding: 15px 40px; font-size: 1.2rem; background: #00ff88; color: #000;
      border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px;
    }

    #debug {
      position: fixed; bottom: 10px; left: 10px; z-index: 10000;
      background: rgba(0,0,0,0.8); color: #00ff88; padding: 10px; border-radius: 10px; font-size: 11px;
      max-width: 90%; pointer-events: none;
    }
  </style>
</head>

<body>

  <div id="desktop">
    <h1>POKEMON AR EXPERIENCE</h1>
    <img src="./assets/marker.png" alt="marker" />
    <p>Abre esta página en tu celular para ver la experiencia.</p>
  </div>

  <div id="mobile">
    <div id="mobile-overlay">
      <h2>Experiencia AR</h2>
      <button id="start-ar-btn">INICIAR CÁMARA</button>
    </div>

    <a-scene
      id="main-scene"
      mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false; uiLoading: no; uiScanning: no;"
      embedded color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="pokemon-video" src="./assets/video.mp4" preload="auto" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-entity" mindar-image-target="targetIndex: 0">
        <a-video src="#pokemon-video" position="0 0 0" width="1" height="1.77"></a-video>
      </a-entity>
    </a-scene>
  </div>

  <div id="debug">Iniciando...</div>

  <script>
    const debug = document.getElementById("debug");
    const log = (msg) => { debug.innerHTML += "<br>> " + msg; };

    function isMobile() { return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent); }

    window.addEventListener("DOMContentLoaded", () => {
      if (isMobile()) {
        document.getElementById("desktop").style.display = "none";
        document.getElementById("mobile").style.display = "block";
      } else {
        document.getElementById("desktop").style.display = "flex";
        document.getElementById("mobile").style.display = "none";
      }
    });

    document.getElementById("start-ar-btn").addEventListener("click", async () => {
      const sceneEl = document.querySelector('a-scene');
      const video = document.getElementById('pokemon-video');
      
      log("Pidiendo permiso de cámara...");
      
      try {
        // Pedir permiso nativo
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        stream.getTracks().forEach(track => track.stop());
        log("Permiso concedido.");

        // Ocultar UI
        document.getElementById("mobile-overlay").style.display = "none";

        // IMPORTANTE: Esperar a que el sistema de MindAR esté cargado en la escena
        const startEngine = () => {
          const arSystem = sceneEl.systems["mindar-image-system"];
          if (arSystem) {
            log("Motor encontrado. Arrancando...");
            arSystem.start();
          } else {
            log("Esperando al motor...");
            setTimeout(startEngine, 300); // Reintentar si no está listo
          }
        };

        startEngine();

      } catch (err) {
        log("ERROR: " + err.message);
      }
    });

    // Lógica de video al detectar
    const target = document.getElementById('target-entity');
    const video = document.getElementById('pokemon-video');

    target.addEventListener("targetFound", () => {
      log("¡Pokemon detectado!");
      video.play();
    });

    target.addEventListener("targetLost", () => {
      video.pause();
    });
  </script>
</body>
</html>
