<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pokemon AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: black; font-family: Arial, sans-serif;
    }

    /* VISTA ESCRITORIO */
    #desktop {
      width: 100vw; height: 100vh;
      display: none; /* Controlado por JS */
      align-items: center; justify-content: center; flex-direction: column; gap: 20px;
      background: #0b1020;
    }

    #desktop img { width: 320px; max-width: 80vw; border-radius: 20px; }
    #desktop h1 { color: white; }
    #desktop p { color: #cccccc; text-align: center; max-width: 500px; line-height: 1.5; }

    /* VISTA MÓVIL */
    #mobile {
      display: none; /* Controlado por JS */
      width: 100vw; height: 100vh;
    }

    /* PANTALLA DE PERMISOS (Solo para móvil) */
    #mobile-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #0b1020; color: white;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    #mobile-overlay button {
      padding: 15px 40px; font-size: 1.2rem; background: #00ff88; color: #000;
      border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px;
    }

    #debug {
      position: fixed; bottom: 10px; left: 10px; z-index: 99999;
      background: rgba(0,0,0,0.8); color: #00ff88; padding: 10px; border-radius: 10px; font-size: 12px;
    }
  </style>
</head>

<body>

  <div id="desktop">
    <h1>POKEMON AR EXPERIENCE</h1>
    <img src="./assets/marker.png" alt="marker" />
    <p>Abre esta misma página desde tu celular y apunta la cámara a esta imagen.</p>
  </div>

  <div id="mobile">
    
    <div id="mobile-overlay">
      <h2>Experiencia AR</h2>
      <p>Toca para activar tu cámara</p>
      <button id="start-ar-btn">INICIAR CÁMARA</button>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false; uiLoading: yes; uiScanning: yes; uiError: yes;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded>

      <a-assets>
        <video id="pokemon-video" src="./assets/video.mp4" preload="auto" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#pokemon-video" position="0 0 0" width="1" height="1.77"></a-video>
      </a-entity>

    </a-scene>
  </div>

  <div id="debug">DEBUG...</div>

  <script>
    const debug = document.getElementById("debug");

    function log(msg) {
      console.log(msg);
      debug.innerHTML += "<br>" + msg;
    }

    function isMobile() {
      return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    window.addEventListener("DOMContentLoaded", () => {
      log("DOM READY");

      if (isMobile()) {
        log("MÓVIL DETECTADO");
        document.getElementById("desktop").style.display = "none";
        document.getElementById("mobile").style.display = "block";
      } else {
        log("ESCRITORIO DETECTADO");
        document.getElementById("desktop").style.display = "flex";
        document.getElementById("mobile").style.display = "none";
      }
    });

    // Lógica para encender la AR solo cuando el usuario toca el botón en el móvil
    document.getElementById("start-ar-btn").addEventListener("click", () => {
      log("Botón presionado, pidiendo cámara...");
      
      const overlay = document.getElementById("mobile-overlay");
      const sceneEl = document.querySelector('a-scene');
      const video = document.getElementById('pokemon-video');

      // 1. Ocultamos el overlay
      overlay.style.display = "none";

      // 2. Truco para desbloquear el video en el celular
      video.play().catch(() => {});
      video.pause();

      // 3. Iniciamos MindAR manualmente
      const arSystem = sceneEl.systems["mindar-image-system"];
      arSystem.start();

      // 4. Lógica de detección
      sceneEl.addEventListener("arReady", () => log("Cámara encendida."));
      sceneEl.addEventListener("arError", () => log("Error al acceder a la cámara."));

      const target = document.querySelector('[mindar-image-target]');
      target.addEventListener("targetFound", () => {
        log("Marcador encontrado");
        video.play();
      });
      target.addEventListener("targetLost", () => {
        log("Marcador perdido");
        video.pause();
      });
    });

  </script>
</body>
</html>
